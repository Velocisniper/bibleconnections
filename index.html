<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Verse Connections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-scroll">

        <div id="setup-screen" class="screen-container">
            <h1>BIBLE VERSE CONNECTIONS</h1>
            
            <div class="logo-placeholder"></div>

            <div class="form-group">
                <label>Select Translation:</label>
                <select id="translation-select">
                    <option value="ESV">ESV</option>
                    <option value="AMP">AMP</option>
                    <option value="ASV">ASV</option>
                    <option value="CPDV">CPDV</option>
                    <option value="ERV">ERV</option>
                    <option value="KJV">KJV</option>
                    <option value="NASB">NASB</option>
                    <option value="WEB">WEB</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Book:</label>
                <select id="book-select">
                    <option value="Entire Bible">Entire Bible</option>
                    <option value="Old Testament">Old Testament</option>
                    <option value="New Testament">New Testament</option>
                </select>
            </div>

            <button id="generate-btn" class="ctk-btn primary-btn">GENERATE BOARD</button>
            <button id="how-to-play-btn" class="ctk-btn secondary-btn">HOW TO PLAY</button>
        </div>

        <div id="game-screen" class="screen-container" style="display: none;">
            
            <div class="header-frame">
                <h2 id="game-title">BIBLE CONNECTIONS</h2>
                <div id="anchors-hint" class="hint-text">Anchors: WORD1, WORD2, WORD3, WORD4</div>
            </div>

            <div id="solved-frame">
                <div class="solved-box" style="background-color: #f9df6d;">
                    <div class="solved-text-content">
                        <strong>Genesis 1:1</strong><br>
                        In the beginning, God created the heavens and the earth.
                    </div>
                </div>
            </div>

            <div id="grid-frame">
                <button class="grid-btn">WORD</button><button class="grid-btn selected">SELECTED</button>
                <button class="grid-btn">WORD</button><button class="grid-btn">WORD</button>
                <button class="grid-btn">WORD</button><button class="grid-btn">WORD</button>
                <button class="grid-btn">WORD</button><button class="grid-btn">WORD</button>
                <button class="grid-btn">WORD</button><button class="grid-btn">WORD</button>
                <button class="grid-btn">WORD</button><button class="grid-btn">WORD</button>
                <button class="grid-btn">WORD</button><button class="grid-btn">WORD</button>
                <button class="grid-btn">WORD</button><button class="grid-btn">WORD</button>
            </div>

            <div class="ctrl-frame">
                <button id="shuffle-btn" class="ctk-btn action-btn">Shuffle</button>
                <button id="deselect-btn" class="ctk-btn action-btn" disabled>Deselect All</button>
                <button id="submit-btn" class="ctk-btn action-btn" disabled>Submit</button>
            </div>

            <div id="msg-label" class="msg-text status-orange">One Away! (Hint: 3 are from John)</div>
            <div id="lives-label" class="lives-text">Lives: ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️ </div>

            <div class="zoom-frame">
                <button id="zoom-out-btn" class="ctk-btn zoom-btn">Zoom -</button>
                <button id="zoom-in-btn" class="ctk-btn zoom-btn">Zoom +</button>
            </div>
        </div>

    </div>
<script src="script.js"></script>
</body>
</html>
